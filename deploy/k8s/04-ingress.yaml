# WebGIS AI Agent Ingress Configuration
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webgis-ingress
  namespace: webgis-prod
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/use-regex: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - webgis.your-domain.com
    secretName: webgis-tls
  rules:
  - host: webgis.your-domain.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: webgis-api-service
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: webgis-api-service
            port:
              number: 80
---
# Horizontal Pod Autoscaler (HPA) for API
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: webgis-api-hpa
  namespace: webgis-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: webgis-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80