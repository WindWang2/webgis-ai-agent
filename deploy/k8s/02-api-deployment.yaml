# WebGIS AI Agent API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webgis-api
  namespace: webgis-prod
  labels:
    app: webgis-ai-agent
    component: api
    environment: production
spec:
  replicas: 2
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  selector:
    matchLabels:
      app: webgis-ai-agent
      component: api
  template:
    metadata:
      labels:
        app: webgis-ai-agent
        component: api
        environment: production
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      # 审计 I24：专用 ServiceAccount，不继承 namespace default SA
      serviceAccountName: webgis-api-sa
      # 审计 I22：topologySpread 防 2 个 api pod 落同一节点 -> 单节点故障全 API 宕
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway  # 不强制（单节点测试集群也能跑）
        labelSelector:
          matchLabels:
            app: webgis-ai-agent
            component: api
      containers:
      - name: webgis-api
        image: webgis-prod:latest
        imagePullPolicy: IfNotPresent
        # 与 Dockerfile.prod 的 CMD 保持一致：使用 standalone server 而非 npx serve。
        # 之前的 `cd /app/frontend/out && npx serve` 引用了 Dockerfile.prod 不产出的目录，
        # 导致 k8s 部署下前端永久 502。
        command: ["sh", "-c"]
        # 审计 P0：trap + wait 确保 SIGTERM 正确传播给 uvicorn + node 子进程，
        # 否则滚动更新时 pod 会脏退出（tini 在 k8s 侧不在 pid 1）。
        args: ["trap 'kill 0' TERM INT; uvicorn app.main:app --host 0.0.0.0 --port 8000 & node frontend/.next/standalone/server.js -p 3000 & wait"]
        ports:
        - containerPort: 8000
          name: api
        - containerPort: 3000
          name: frontend
        envFrom:
        - configMapRef:
            name: webgis-config
        - secretRef:
            name: webgis-secret
        livenessProbe:
          httpGet:
            path: /api/v1/health/live
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            # /api/v1/ready 在依赖不可达时返回 503，触发 pod 摘出流量
            path: /api/v1/ready
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 2
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        volumeMounts:
        - name: uploads-volume
          mountPath: /app/uploads
      volumes:
      - name: uploads-volume
        persistentVolumeClaim:
          claimName: webgis-uploads-pvc
---
# WebGIS API Service
apiVersion: v1
kind: Service
metadata:
  name: webgis-api-service
  namespace: webgis-prod
  labels:
    app: webgis-ai-agent
    component: api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    name: frontend
  - port: 8000
    targetPort: 8000
    name: api
  selector:
    app: webgis-ai-agent
    component: api