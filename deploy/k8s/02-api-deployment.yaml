# WebGIS AI Agent API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webgis-api
  namespace: webgis-prod
  labels:
    app: webgis-ai-agent
    component: api
    environment: production
spec:
  replicas: 2
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  selector:
    matchLabels:
      app: webgis-ai-agent
      component: api
  template:
    metadata:
      labels:
        app: webgis-ai-agent
        component: api
        environment: production
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: webgis-api
        image: webgis-prod:latest
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c"]
        args: ["cd /app/frontend/out && npx serve@latest -s . -l 3000 & uvicorn app.main:app --host 0.0.0.0 --port 8000"]
        ports:
        - containerPort: 8000
          name: api
        - containerPort: 3000
          name: frontend
        envFrom:
        - configMapRef:
            name: webgis-config
        - secretRef:
            name: webgis-secret
        livenessProbe:
          httpGet:
            path: /api/v1/health/live
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health/ready
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 2
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        volumeMounts:
        - name: uploads-volume
          mountPath: /app/frontend/out/uploads
      volumes:
      - name: uploads-volume
        persistentVolumeClaim:
          claimName: webgis-uploads-pvc
---
# WebGIS API Service
apiVersion: v1
kind: Service
metadata:
  name: webgis-api-service
  namespace: webgis-prod
  labels:
    app: webgis-ai-agent
    component: api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    name: frontend
  - port: 8000
    targetPort: 8000
    name: api
  selector:
    app: webgis-ai-agent
    component: api