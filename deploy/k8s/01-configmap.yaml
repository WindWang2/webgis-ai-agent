# WebGIS AI Agent ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: webgis-config
  namespace: webgis-prod
data:
  ENV: "production"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  PYTHONUNBUFFERED: "1"
  API_PORT: "8000"
  FRONTEND_PORT: "3000"
  # 必须替换为真实的前端域名。设为 "*" 会触发 app/core/config.py 启动校验崩溃
  # （is_production() 且 CORS 含通配符 → 拒绝启动），或一旦校验放宽则变成
  # 配合 allow_credentials=True 的 CSRF 攻击面。
  CORS_ORIGINS: "https://webgis.example.com"
  CELERY_CONCURRENCY: "2"
---
# WebGIS AI Agent Secrets (Base64 encoded - replace with your actual values)
apiVersion: v1
kind: Secret
metadata:
  name: webgis-secret
  namespace: webgis-prod
type: Opaque
stringData:
  # 数据库连接 (postgresql://user:password@host:port/dbname)
  DATABASE_URL: "postgresql://webgis_prod:ChangeMeStrongPwd123!@postgres:5432/webgis_prod"
  # JWT 密钥 (至少32位随机字符串)
  JWT_SECRET_KEY: "your-secure-jwt-secret-key-min-32-chars"
  # Redis 连接
  REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "redis://redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis:6379/1"