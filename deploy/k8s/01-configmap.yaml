# WebGIS AI Agent ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: webgis-config
  namespace: webgis-prod
data:
  ENV: "production"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  PYTHONUNBUFFERED: "1"
  API_PORT: "8000"
  FRONTEND_PORT: "3000"
  # 必须替换为真实的前端域名。设为 "*" 会触发 app/core/config.py 启动校验崩溃
  # （is_production() 且 CORS 含通配符 → 拒绝启动），或一旦校验放宽则变成
  # 配合 allow_credentials=True 的 CSRF 攻击面。
  CORS_ORIGINS: "https://webgis.example.com"
  CELERY_CONCURRENCY: "2"
---
# ⚠️ 审计 I4：Secret 资源已从此文件移除。
#
# 之前用 stringData 把明文凭证（DATABASE_URL / JWT_SECRET_KEY / Redis URL）
# 提交进 git，且使用弱占位密码（DB / JWT secret 均为默认值）。任何拿到
# repo 访问权的人立即获得 prod 入口；git 历史追溯困难。
#
# 新流程：部署前用 kubectl 创建 Secret（不进 git）：
#
#   kubectl create secret generic webgis-secret --namespace=webgis-prod \
#     --from-literal=DATABASE_URL='postgresql://USER:PWD@postgres:5432/DB' \
#     --from-literal=JWT_SECRET_KEY="$(openssl rand -hex 32)" \
#     --from-literal=REDIS_URL='redis://:PWD@redis:6379/0' \
#     --from-literal=CELERY_BROKER_URL='redis://:PWD@redis:6379/0' \
#     --from-literal=CELERY_RESULT_BACKEND='redis://:PWD@redis:6379/1'
#
# 或更安全：用 SealedSecrets / External Secrets / Vault 配合 GitOps。
# 详见 docs/DEPLOYMENT.md 的 "Secret Management" 章节。
