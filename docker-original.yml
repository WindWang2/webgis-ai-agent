version: "3.8"
services:
  db:
    image: postgis/postgis:15-3.4
    container_name: webgis-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webgis
    ports: ["5432:5432"]
    volumes: [pg_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: webgis-redis
    ports: ["6379:6379"]
    command: redis-server --appendonly --maxmemory 256mb
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
  api:
    build: .
    container_name: webgis-api
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/webgis
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
  celery-worker:
    build: .
    container_name: webgis-celery
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/webgis
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: celery -A app.services.celery_worker worker -l info
volumes:
  pg_data:
  redis_data:
  uploads: