# docker-compose.yml
services:
  db:
    image: postgis/postgis:15-3.4
    container_name: webgis-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_NAME:-webgis}
    ports:
      - "127.0.0.1:${DB_PORT:-15432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 1g
          cpus: "0.5"

  redis:
    image: redis:7-alpine
    container_name: webgis-redis
    ports:
      - "127.0.0.1:${REDIS_PORT:-16379}:6379"
    # 审计 P1：开发环境也拒绝弱默认密码。之前 dev_redis_pass 硬编码且多处重复。
    command: redis-server --appendonly --maxmemory 256mb --maxmemory-policy allkeys-lru --bind 0.0.0.0 --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    environment:
      # 审计 P0：healthcheck 不直接暴露密码。通过 REDISCLI_AUTH 环境变量传递，
      # 避免密码出现在 docker inspect 的 healthcheck 命令中。
      - REDISCLI_AUTH=${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 256m
          cpus: "0.25"

  api:
    build:
      context: .
      target: backend-builder
    container_name: webgis-api
    ports:
      - "${API_PORT:-18000}:8000"
    environment:
      # 方式1: 通过完整 DATABASE_URL（推荐）
      - DATABASE_URL=${DATABASE_URL:-}
      # 方式2: 通过单独组件环境变量
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-webgis}
      # Redis 配置
      - REDIS_URL=redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-dev_redis_pass}@${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # 审计 I17 / INF-001：bind-mount ./app 让开发热重载方便，但会覆盖镜像代码。
      # 改为显式 opt-in：设置 WEBGIS_DEV_MOUNT=./app 启用，默认不挂载。
      ${WEBGIS_DEV_MOUNT:+- ${WEBGIS_DEV_MOUNT}:/app/app}
      - uploads:/app/data
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 512m
          cpus: "0.25"

  celery-worker:
    build: .
    container_name: webgis-celery
    environment:
      # 方式1: 通过完整 DATABASE_URL
      - DATABASE_URL=${DATABASE_URL:-}
      # 方式2: 通过单独组件环境变量
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-webgis}
      # Redis 配置
      - REDIS_URL=redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # 审计 INF-003：bind-mount 改为显式 opt-in，与 api 服务一致。
      ${WEBGIS_DEV_MOUNT:+- ${WEBGIS_DEV_MOUNT}:/app/app}
    env_file:
      - .env
    command: celery -A app.services.task_queue worker -l info
    healthcheck:
      # 审计 INF-003：celery-worker 缺少 healthcheck，depends_on 无法等待就绪。
      test: ["CMD-SHELL", "celery -A app.services.task_queue inspect ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 512m
          cpus: "0.25"

volumes:
  pg_data:
  redis_data:
  uploads: