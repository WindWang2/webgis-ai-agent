[pytest]
testpaths = tests
pythonpath = .
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
; 覆盖率闸由 CI 命令行控制（--cov-fail-under）。
; smoke-test-* 是脚本不是 pytest 用例，保留 --ignore。
; 其余被 --ignore 的测试待后续修复后逐一恢复。
addopts = --ignore=tests/test_spatial_engine_bugs.py --ignore=tests/test_core_features_sanity.py --ignore=tests/unit/test_spatial_buffer.py --ignore=tests/smoke-test-buffer.py --ignore=tests/smoke_deep_enhancement.py --cov=app --cov-report=term-missing
filterwarnings =
    ignore::PendingDeprecationWarning:starlette.*
    ignore:Please use `import python_multipart`:PendingDeprecationWarning
    ignore:Glyph .* missing from font:UserWarning
markers =
    heavy: tests that import geopandas/numpy/rasterio (run with: pytest -m heavy)
