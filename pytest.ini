[pytest]
testpaths = tests
pythonpath = .
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts = --ignore=tests/test_spatial_engine_bugs.py --ignore=tests/test_core_features_sanity.py --ignore=tests/unit/test_spatial_buffer.py --ignore=tests/smoke-test-buffer.py --ignore=tests/smoke_deep_enhancement.py --cov=app --cov-report=term-missing --cov-fail-under=0
filterwarnings =
    ignore::PendingDeprecationWarning:starlette.*
    ignore:Please use `import python_multipart`:PendingDeprecationWarning
    ignore:Glyph .* missing from font:UserWarning
markers =
    heavy: tests that import geopandas/numpy/rasterio (run with: pytest -m heavy)
