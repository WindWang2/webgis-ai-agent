version: '3.8'

services:
  frontend:
    build:
      context: ..
      dockerfile: Dockerfile
      target: frontend-builder
    ports:
      - "3000:3000"
    volumes:
      - ./app:/app/frontend/app
      - ./components:/app/frontend/components
      - ./lib:/app/frontend/lib
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    command: npm run dev
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 512m
          cpus: "0.25"
