# ============================================================
# WebGIS AI Agent 生产环境 Docker Compose（安全远程部署版）
# 
# 特点：
# - 数据库和 Redis 仅容器内部网络通信，不暴露端口
# - 适合部署到拥有公网 IP 的服务器
# - 可配合 Nginx 反向代理使用 HTTPS
#
# 使用: docker-compose -f docker-compose.prod.secure.yml up -d
#
# ⚠️ 部署前必须创建 .env.Priv 文件（见 .env.Priv.example 模板）。
# ============================================================

services:
  db:
    image: postgis/postgis:15-3.4
    container_name: webgis-prod-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-webgis_prod}
      # 审计 P0：明确提示从 .env.Priv 读取，不存在时拒绝启动而非使用弱默认值。
      POSTGRES_PASSWORD: "${DB_PWD:?ERROR: DB_PWD not set. Copy .env.Priv.example to .env.Priv and set DB_PWD.}"
      POSTGRES_DB: ${DB_NAME:-webgis_prod}
      # 审计 I20：之前缺 PGDATA，Postgres 直接初始化在 mount 根 ->
      # lost+found 冲突 / 权限问题。与 prod.yml 一致加 PGDATA 子目录。
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pg_data_secure:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-webgis_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - webgis-internal
    # 生产环境：不暴露端口，仅通过内部网络

  redis:
    image: redis:7-alpine
    container_name: webgis-prod-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --bind 0.0.0.0
      --requirepass "${REDIS_PASSWORD:?ERROR: REDIS_PASSWORD not set. Copy .env.Priv.example to .env.Priv and set REDIS_PASSWORD.}"
    volumes:
      - redis_data_secure:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?ERROR: REDIS_PASSWORD not set. Copy .env.Priv.example to .env.Priv}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - webgis-internal

  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: webgis-prod-api
    restart: unless-stopped
    environment:
      - ENV=production
      - DEBUG=false
      - DATABASE_URL=postgresql://${DB_USER:-webgis_prod}:${DB_PWD}@db:5432/${DB_NAME:-webgis_prod}
      - JWT_SECRET_KEY="${JWT_SECRET_KEY:?ERROR: JWT_SECRET_KEY not set. Set it in .env.Priv.}"
      - REDIS_URL=redis://:${REDIS_PASSWORD:?ERROR: REDIS_PASSWORD not set. Copy .env.Priv.example to .env.Priv}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:?ERROR: REDIS_PASSWORD not set. Copy .env.Priv.example to .env.Priv}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:?ERROR: REDIS_PASSWORD not set. Copy .env.Priv.example to .env.Priv}@redis:6379/1
      - CORS_ORIGINS=${CORS_ORIGINS}
      - LOG_LEVEL=INFO
      # 审计 P1：统一上传路径为 /app/uploads（与 Dockerfile.prod 创建的一致）。
      - DATA_DIR=/app
    env_file:
      - .env.Priv
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    # 审计 P0：api healthcheck 使用 wget，但 Dockerfile.prod runner 不装 wget。
    # 改用 python3 urllib（已修复 Dockerfile.prod HEALTHCHECK，此处同步）。
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live', timeout=5)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - webgis-internal

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: webgis-prod-celery
    restart: unless-stopped
    environment:
      - ENV=production
      - DATABASE_URL=postgresql://${DB_USER:-webgis_prod}:${DB_PWD}@db:5432/${DB_NAME:-webgis_prod}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?ERROR: REDIS_PASSWORD not set. Copy .env.Priv.example to .env.Priv}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:?ERROR: REDIS_PASSWORD not set. Copy .env.Priv.example to .env.Priv}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:?ERROR: REDIS_PASSWORD not set. Copy .env.Priv.example to .env.Priv}@redis:6379/1
    env_file:
      - .env.Priv
    command: celery -A app.services.task_queue worker --loglevel=info --concurrency=2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - webgis-internal

  # Nginx 反向代理（HTTPS 终止）
  nginx:
    image: nginx:1.27-alpine
    container_name: webgis-prod-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs_secure:/var/log/nginx
    depends_on:
      - api
    networks:
      - webgis-internal

  # Prometheus 监控（如需要）
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: webgis-prod-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./deploy/prometheus.secure.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data_secure:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - webgis-internal

volumes:
  pg_data_secure:
  redis_data_secure:
  nginx_logs_secure:
  prometheus_data_secure:

networks:
  webgis-internal:
    driver: bridge
